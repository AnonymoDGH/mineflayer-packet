

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="cardFly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="cardNoFall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cardSpeed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="cardBlink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f0ff"/>
      <stop offset="100%" stop-color="#e8e0ff"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="114%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.10" flood-color="#1e293b"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.07" flood-color="#1e293b"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="560" rx="20" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="978" height="558" rx="20" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="1" y="1" width="978" height="60" rx="20" fill="#1e293b"/>
  <rect x="1" y="32" width="978" height="29" fill="#1e293b"/>
  <circle cx="32" cy="31" r="7" fill="#ef4444" opacity="0.9"/>
  <circle cx="54" cy="31" r="7" fill="#f59e0b" opacity="0.9"/>
  <circle cx="76" cy="31" r="7" fill="#22c55e" opacity="0.9"/>
  <text x="490" y="38" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="19" fill="#f1f5f9" text-anchor="middle" letter-spacing="0.5">📋 Packet Hack Summary</text>

  <!-- ════════════ CARD 1: FLY ════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="82" width="450" height="200" rx="16" fill="url(#cardFly)" stroke="#93b4f8" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="30" y="82" width="450" height="50" rx="16" fill="#3b82f6" opacity="0.12"/>
  <rect x="30" y="110" width="450" height="22" fill="#3b82f6" opacity="0.12"/>
  <rect x="50" y="92" width="36" height="36" rx="10" fill="#3b82f6" opacity="0.2"/>
  <text x="68" y="117" font-size="20" text-anchor="middle">🕊️</text>
  <text x="100" y="115" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="20" fill="#1e3a8a">Fly</text>
  <!-- Tag -->
  <rect x="370" y="95" width="90" height="24" rx="8" fill="#3b82f6" opacity="0.18"/>
  <text x="415" y="112" font-family="'SF Mono',monospace" font-weight="700" font-size="11" fill="#1d4ed8" text-anchor="middle">position</text>
  <!-- Content -->
  <circle cx="62" cy="155" r="4" fill="#3b82f6"/>
  <text x="78" y="160" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Sends "position" packets with periodic offsets.</text>
  <circle cx="62" cy="185" r="4" fill="#3b82f6"/>
  <text x="78" y="190" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Uses yaw to move in the look direction.</text>
  <circle cx="62" cy="215" r="4" fill="#3b82f6"/>
  <text x="78" y="220" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Params:</text>
  <rect x="142" y="206" width="118" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="201" y="221" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#2563eb" text-anchor="middle">horizontalBoost</text>
  <rect x="266" y="206" width="100" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="316" y="221" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#2563eb" text-anchor="middle">verticalBoost</text>
  <rect x="372" y="206" width="80" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="412" y="221" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#2563eb" text-anchor="middle">intervalMs</text>
  <!-- Separator -->
  <line x1="50" y1="248" x2="460" y2="248" stroke="#93b4f8" stroke-width="1" opacity="0.4"/>
  <text x="255" y="268" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">Simulates creative-mode flight via raw packets</text>

  <!-- ════════════ CARD 2: NOFALL ════════════ -->
  <g filter="url(#shadow)">
    <rect x="500" y="82" width="450" height="200" rx="16" fill="url(#cardNoFall)" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="500" y="82" width="450" height="50" rx="16" fill="#f59e0b" opacity="0.15"/>
  <rect x="500" y="110" width="450" height="22" fill="#f59e0b" opacity="0.15"/>
  <rect x="520" y="92" width="36" height="36" rx="10" fill="#f59e0b" opacity="0.2"/>
  <text x="538" y="117" font-size="20" text-anchor="middle">🛡️</text>
  <text x="570" y="115" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="20" fill="#92400e">NoFall</text>
  <!-- Tag -->
  <rect x="830" y="95" width="100" height="24" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="880" y="112" font-family="'SF Mono',monospace" font-weight="700" font-size="11" fill="#b45309" text-anchor="middle">onGround</text>
  <!-- Content -->
  <circle cx="532" cy="155" r="4" fill="#d97706"/>
  <text x="548" y="160" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Intercepts outgoing movement packets.</text>
  <circle cx="532" cy="185" r="4" fill="#d97706"/>
  <text x="548" y="190" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Forces</text>
  <rect x="600" y="176" width="120" height="22" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="660" y="192" font-family="'SF Mono',monospace" font-weight="600" font-size="12" fill="#b45309" text-anchor="middle">onGround: true</text>
  <text x="730" y="190" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">to negate fall damage.</text>
  <circle cx="532" cy="215" r="4" fill="#d97706"/>
  <text x="548" y="220" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Fully compatible with Fly and Speed hacks.</text>
  <!-- Separator -->
  <line x1="520" y1="248" x2="930" y2="248" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <text x="725" y="268" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">Prevents all fall damage by spoofing ground state</text>

  <!-- ════════════ CARD 3: SPEED ════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="304" width="450" height="200" rx="16" fill="url(#cardSpeed)" stroke="#86efac" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="30" y="304" width="450" height="50" rx="16" fill="#22c55e" opacity="0.12"/>
  <rect x="30" y="332" width="450" height="22" fill="#22c55e" opacity="0.12"/>
  <rect x="50" y="314" width="36" height="36" rx="10" fill="#22c55e" opacity="0.2"/>
  <text x="68" y="339" font-size="20" text-anchor="middle">⚡</text>
  <text x="100" y="337" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="20" fill="#14532d">Speed</text>
  <!-- Tag -->
  <rect x="370" y="317" width="90" height="24" rx="8" fill="#22c55e" opacity="0.18"/>
  <text x="415" y="334" font-family="'SF Mono',monospace" font-weight="700" font-size="11" fill="#15803d" text-anchor="middle">burst</text>
  <!-- Content -->
  <circle cx="62" cy="377" r="4" fill="#16a34a"/>
  <text x="78" y="382" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Repeats position sends (burst) per tick.</text>
  <circle cx="62" cy="407" r="4" fill="#16a34a"/>
  <text x="78" y="412" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Injects small offsets to "accelerate" movement.</text>
  <circle cx="62" cy="437" r="4" fill="#16a34a"/>
  <text x="78" y="442" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Params:</text>
  <rect x="142" y="428" width="82" height="22" rx="6" fill="#22c55e" opacity="0.12"/>
  <text x="183" y="443" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#15803d" text-anchor="middle">multiplier</text>
  <rect x="232" y="428" width="108" height="22" rx="6" fill="#22c55e" opacity="0.12"/>
  <text x="286" y="443" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#15803d" text-anchor="middle">burstPackets</text>
  <!-- Separator -->
  <line x1="50" y1="468" x2="460" y2="468" stroke="#86efac" stroke-width="1" opacity="0.4"/>
  <text x="255" y="490" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">Multiplies effective movement speed via packet spam</text>

  <!-- ════════════ CARD 4: BLINK ════════════ -->
  <g filter="url(#shadow)">
    <rect x="500" y="304" width="450" height="200" rx="16" fill="url(#cardBlink)" stroke="#b197fc" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="500" y="304" width="450" height="50" rx="16" fill="#7c3aed" opacity="0.1"/>
  <rect x="500" y="332" width="450" height="22" fill="#7c3aed" opacity="0.1"/>
  <rect x="520" y="314" width="36" height="36" rx="10" fill="#7c3aed" opacity="0.2"/>
  <text x="538" y="339" font-size="20" text-anchor="middle">👻</text>
  <text x="570" y="337" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="20" fill="#3b1f6e">Blink</text>
  <!-- Tag -->
  <rect x="840" y="317" width="90" height="24" rx="8" fill="#7c3aed" opacity="0.15"/>
  <text x="885" y="334" font-family="'SF Mono',monospace" font-weight="700" font-size="11" fill="#6d28d9" text-anchor="middle">queue</text>
  <!-- Content -->
  <circle cx="532" cy="377" r="4" fill="#7c3aed"/>
  <text x="548" y="382" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Queues movement packets in memory.</text>
  <circle cx="532" cy="407" r="4" fill="#7c3aed"/>
  <text x="548" y="412" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">On disable, can flush all packets at once.</text>
  <circle cx="532" cy="437" r="4" fill="#7c3aed"/>
  <text x="548" y="442" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="14" fill="#334155">Useful for desync / lag simulation testing.</text>
  <!-- Separator -->
  <line x1="520" y1="468" x2="930" y2="468" stroke="#b197fc" stroke-width="1" opacity="0.4"/>
  <text x="725" y="490" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">Creates a "teleport" effect by holding then releasing packets</text>

  <!-- Footer watermark -->
  <text x="490" y="540" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#94a3b8" text-anchor="middle" opacity="0.6">⚠ For testing and analysis environments only — may be detected by anticheat systems</text>
</svg>
