

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <marker id="arrowHead" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,1 L12,5 L0,9" fill="#3557d6" stroke="#3557d6" stroke-width="1"/>
    </marker>
    <marker id="arrowBack" markerWidth="14" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M12,1 L0,5 L12,9" fill="#94a3b8" stroke="#94a3b8" stroke-width="1"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f0ff"/>
      <stop offset="100%" stop-color="#e8e0ff"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.10" flood-color="#1e293b"/>
    </filter>
    <filter id="shadowSm" x="-3%" y="-6%" width="106%" height="118%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08" flood-color="#1e293b"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="420" rx="20" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="978" height="418" rx="20" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="1" y="1" width="978" height="56" rx="20" fill="#1e293b"/>
  <rect x="1" y="30" width="978" height="27" fill="#1e293b"/>
  <circle cx="32" cy="28" r="7" fill="#ef4444" opacity="0.9"/>
  <circle cx="54" cy="28" r="7" fill="#f59e0b" opacity="0.9"/>
  <circle cx="76" cy="28" r="7" fill="#22c55e" opacity="0.9"/>
  <text x="490" y="35" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="18" fill="#f1f5f9" text-anchor="middle" letter-spacing="0.5">📦 Flujo de interceptación de paquetes</text>

  <!-- Step numbers & connectors background decoration -->
  <circle cx="120" cy="83" r="14" fill="#3b82f6" opacity="0.12"/>
  <circle cx="490" cy="83" r="14" fill="#7c3aed" opacity="0.12"/>
  <circle cx="830" cy="83" r="14" fill="#16a34a" opacity="0.12"/>

  <text x="120" y="88" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="13" fill="#3b82f6" text-anchor="middle">1</text>
  <text x="490" y="88" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="13" fill="#7c3aed" text-anchor="middle">2</text>
  <text x="830" y="88" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="13" fill="#16a34a" text-anchor="middle">3</text>

  <!-- === BOX 1: Mineflayer === -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="220" height="150" rx="16" fill="url(#boxBlue)" stroke="#93b4f8" stroke-width="1.8"/>
  </g>
  <!-- Icon -->
  <rect x="50" y="118" width="36" height="36" rx="10" fill="#3b82f6" opacity="0.15"/>
  <text x="68" y="143" font-size="20" text-anchor="middle">🤖</text>
  <!-- Text -->
  <text x="96" y="133" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="15" fill="#1e3a5f">Mineflayer</text>
  <text x="96" y="150" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11.5" fill="#64748b">(cliente bot)</text>
  <line x1="50" y1="168" x2="230" y2="168" stroke="#93b4f8" stroke-width="1" opacity="0.5"/>
  <!-- Tags -->
  <rect x="50" y="178" width="76" height="24" rx="7" fill="#3b82f6" opacity="0.12"/>
  <text x="88" y="194" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#2563eb" text-anchor="middle">position</text>
  <rect x="134" y="178" width="52" height="24" rx="7" fill="#3b82f6" opacity="0.12"/>
  <text x="160" y="194" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#2563eb" text-anchor="middle">look</text>
  <rect x="50" y="208" width="56" height="24" rx="7" fill="#3b82f6" opacity="0.12"/>
  <text x="78" y="224" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#2563eb" text-anchor="middle">flying</text>
  <rect x="114" y="208" width="68" height="24" rx="7" fill="#3b82f6" opacity="0.12"/>
  <text x="148" y="224" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#2563eb" text-anchor="middle">physics</text>

  <!-- === ARROW 1→2 === -->
  <line x1="254" y1="175" x2="354" y2="175" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowHead)" opacity="0.7"/>
  <text x="304" y="165" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748b" text-anchor="middle">paquetes</text>

  <!-- === BOX 2: Plugin packetHacks === -->
  <g filter="url(#shadow)">
    <rect x="360" y="100" width="260" height="150" rx="16" fill="url(#boxPurple)" stroke="#b197fc" stroke-width="1.8"/>
  </g>
  <!-- Icon -->
  <rect x="380" y="118" width="36" height="36" rx="10" fill="#7c3aed" opacity="0.15"/>
  <text x="398" y="143" font-size="20" text-anchor="middle">⚡</text>
  <!-- Text -->
  <text x="426" y="133" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="15" fill="#3b1f6e">Plugin packetHacks</text>
  <text x="426" y="150" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11.5" fill="#64748b">(interceptor de paquetes)</text>
  <line x1="380" y1="168" x2="600" y2="168" stroke="#b197fc" stroke-width="1" opacity="0.5"/>
  <!-- Tags -->
  <rect x="380" y="178" width="58" height="24" rx="7" fill="#7c3aed" opacity="0.12"/>
  <text x="409" y="194" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#6d28d9" text-anchor="middle">noFall</text>
  <rect x="446" y="178" width="56" height="24" rx="7" fill="#7c3aed" opacity="0.12"/>
  <text x="474" y="194" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#6d28d9" text-anchor="middle">speed</text>
  <rect x="510" y="178" width="48" height="24" rx="7" fill="#7c3aed" opacity="0.12"/>
  <text x="534" y="194" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#6d28d9" text-anchor="middle">blink</text>
  <rect x="566" y="178" width="38" height="24" rx="7" fill="#7c3aed" opacity="0.12"/>
  <text x="585" y="194" font-family="'SF Mono',monospace" font-weight="600" font-size="11" fill="#6d28d9" text-anchor="middle">fly</text>
  <!-- Description -->
  <text x="490" y="224" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11.5" fill="#6b7280" text-anchor="middle">Modifica, retrasa o descarta</text>
  <text x="490" y="239" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11.5" fill="#6b7280" text-anchor="middle">paquetes antes del envío</text>

  <!-- === ARROW 2→3 === -->
  <line x1="624" y1="175" x2="714" y2="175" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowHead)" opacity="0.7"/>
  <text x="669" y="165" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748b" text-anchor="middle">alterados</text>

  <!-- === BOX 3: Servidor === -->
  <g filter="url(#shadow)">
    <rect x="720" y="100" width="220" height="150" rx="16" fill="url(#boxGreen)" stroke="#86efac" stroke-width="1.8"/>
  </g>
  <!-- Icon -->
  <rect x="740" y="118" width="36" height="36" rx="10" fill="#16a34a" opacity="0.15"/>
  <text x="758" y="143" font-size="20" text-anchor="middle">🖥️</text>
  <!-- Text -->
  <text x="786" y="133" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="15" fill="#14532d">Servidor MC</text>
  <text x="786" y="150" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11.5" fill="#64748b">(destino final)</text>
  <line x1="740" y1="168" x2="920" y2="168" stroke="#86efac" stroke-width="1" opacity="0.5"/>
  <!-- Description -->
  <text x="830" y="190" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12" fill="#4b5563" text-anchor="middle">Recibe los paquetes</text>
  <text x="830" y="207" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12" fill="#4b5563" text-anchor="middle">ya modificados como</text>
  <text x="830" y="224" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12" fill="#4b5563" text-anchor="middle">si fueran legítimos</text>

  <!-- Return arrow (subtle) -->
  <path d="M780,254 L780,270 L200,270 L200,254" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowBack)" opacity="0.4"/>
  <text x="490" y="285" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="10" fill="#94a3b8" text-anchor="middle">respuesta del servidor</text>

  <!-- === Warning note === -->
  <g filter="url(#shadowSm)">
    <rect x="190" y="310" width="600" height="68" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="210" y="326" width="34" height="34" rx="9" fill="#f59e0b" opacity="0.18"/>
  <text x="227" y="350" font-size="18" text-anchor="middle">⚠️</text>
  <text x="256" y="342" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="13" fill="#92400e">Advertencia:</text>
  <text x="355" y="342" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12.5" fill="#92400e">Este plugin está diseñado para entornos de prueba y análisis.</text>
  <text x="256" y="362" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12.5" fill="#92400e">Su uso en servidores públicos puede ser detectado por sistemas anticheat.</text>
</svg>
