<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <style>
    .title { font: 700 26px sans-serif; fill: #101828; }
    .box { fill: #eef4ff; stroke: #3557d6; stroke-width: 2; rx: 14; }
    .text { font: 600 16px sans-serif; fill: #1f2937; }
    .arrow { stroke: #344054; stroke-width: 3; marker-end: url(#arrowHead); }
    .note { font: 500 14px sans-serif; fill: #475467; }
  </style>
  <defs>
    <marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#344054"/>
    </marker>
  </defs>

  <text x="30" y="42" class="title">Flujo de interceptación de paquetes</text>

  <rect x="40" y="90" width="230" height="110" class="box"/>
  <text x="78" y="135" class="text">Mineflayer (movimiento)</text>
  <text x="85" y="162" class="note">position / look / flying</text>

  <rect x="370" y="70" width="250" height="150" class="box"/>
  <text x="424" y="120" class="text">Plugin packetHacks</text>
  <text x="407" y="148" class="note">noFall, speed, blink, fly</text>
  <text x="440" y="174" class="note">modifica o retrasa paquetes</text>

  <rect x="720" y="90" width="220" height="110" class="box"/>
  <text x="774" y="136" class="text">Servidor</text>
  <text x="758" y="163" class="note">recibe paquetes alterados</text>

  <line x1="272" y1="145" x2="366" y2="145" class="arrow"/>
  <line x1="624" y1="145" x2="715" y2="145" class="arrow"/>

  <rect x="370" y="250" width="570" height="80" fill="#fff7ed" stroke="#f97316" stroke-width="2" rx="12"/>
  <text x="390" y="282" class="text" fill="#9a3412">Nota:</text>
  <text x="447" y="282" class="note" fill="#9a3412">el plugin está pensado para entornos de prueba/análisis y puede ser detectado por anticheat.</text>
</svg>
