

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="380" viewBox="0 0 980 380">
  <defs>
    <marker id="arrowHead" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,1 L12,5 L0,9" fill="#3557d6" stroke="#3557d6" stroke-width="1"/>
    </marker>
    <marker id="arrowBack" markerWidth="14" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M12,1 L0,5 L12,9" fill="#94a3b8" stroke="#94a3b8" stroke-width="1"/>
    </marker>
    <linearGradient id="boxBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f0ff"/>
      <stop offset="100%" stop-color="#e8e0ff"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.08" flood-color="#1e293b"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="490" y="32" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="24" fill="#0f172a" text-anchor="middle" letter-spacing="-0.5">Packet Interception Flow</text>
  <text x="490" y="52" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12" fill="#64748b" text-anchor="middle">How mineflayer-packet intercepts, modifies, and forwards packets</text>

  <!-- Step indicators -->
  <circle cx="140" cy="82" r="14" fill="#3b82f6" opacity="0.12"/>
  <circle cx="490" cy="82" r="14" fill="#7c3aed" opacity="0.12"/>
  <circle cx="840" cy="82" r="14" fill="#16a34a" opacity="0.12"/>
  <text x="140" y="87" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="13" fill="#3b82f6" text-anchor="middle">1</text>
  <text x="490" y="87" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="13" fill="#7c3aed" text-anchor="middle">2</text>
  <text x="840" y="87" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="13" fill="#16a34a" text-anchor="middle">3</text>

  <!-- === BOX 1: Mineflayer === -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="220" height="165" rx="16" fill="url(#boxBlue)" stroke="#93b4f8" stroke-width="1.5"/>
  </g>
  <rect x="50" y="118" width="34" height="34" rx="9" fill="#3b82f6" opacity="0.15"/>
  <text x="67" y="141" font-size="18" text-anchor="middle">🤖</text>
  <text x="94" y="132" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="15" fill="#1e3a5f">Mineflayer</text>
  <text x="94" y="148" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#64748b">(bot client)</text>
  <line x1="50" y1="166" x2="230" y2="166" stroke="#93b4f8" stroke-width="1" opacity="0.4"/>
  <rect x="50" y="176" width="72" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="86" y="191" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#2563eb" text-anchor="middle">position</text>
  <rect x="128" y="176" width="48" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="152" y="191" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#2563eb" text-anchor="middle">look</text>
  <rect x="182" y="176" width="48" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="206" y="191" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#2563eb" text-anchor="middle">flying</text>
  <rect x="50" y="204" width="62" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="81" y="219" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#2563eb" text-anchor="middle">physics</text>
  <rect x="118" y="204" width="78" height="22" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="157" y="219" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#2563eb" text-anchor="middle">block_dig</text>
  <text x="140" y="250" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="10" fill="#64748b" text-anchor="middle">Generates movement &amp; action packets</text>

  <!-- === ARROW 1→2 === -->
  <line x1="254" y1="182" x2="354" y2="182" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowHead)" opacity="0.65"/>
  <text x="304" y="172" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748b" text-anchor="middle">raw packets</text>

  <!-- === BOX 2: Plugin === -->
  <g filter="url(#shadow)">
    <rect x="360" y="100" width="260" height="165" rx="16" fill="url(#boxPurple)" stroke="#b197fc" stroke-width="1.5"/>
  </g>
  <rect x="380" y="118" width="34" height="34" rx="9" fill="#7c3aed" opacity="0.15"/>
  <text x="397" y="141" font-size="18" text-anchor="middle">⚡</text>
  <text x="424" y="132" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="15" fill="#3b1f6e">packetHacks Plugin</text>
  <text x="424" y="148" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#64748b">(packet interceptor)</text>
  <line x1="380" y1="166" x2="600" y2="166" stroke="#b197fc" stroke-width="1" opacity="0.4"/>
  <rect x="380" y="176" width="52" height="22" rx="6" fill="#7c3aed" opacity="0.1"/>
  <text x="406" y="191" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#6d28d9" text-anchor="middle">nofall</text>
  <rect x="438" y="176" width="52" height="22" rx="6" fill="#7c3aed" opacity="0.1"/>
  <text x="464" y="191" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#6d28d9" text-anchor="middle">speed</text>
  <rect x="496" y="176" width="46" height="22" rx="6" fill="#7c3aed" opacity="0.1"/>
  <text x="519" y="191" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#6d28d9" text-anchor="middle">blink</text>
  <rect x="548" y="176" width="36" height="22" rx="6" fill="#7c3aed" opacity="0.1"/>
  <text x="566" y="191" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#6d28d9" text-anchor="middle">fly</text>
  <rect x="380" y="204" width="52" height="22" rx="6" fill="#7c3aed" opacity="0.1"/>
  <text x="406" y="219" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#6d28d9" text-anchor="middle">phase</text>
  <rect x="438" y="204" width="58" height="22" rx="6" fill="#7c3aed" opacity="0.1"/>
  <text x="467" y="219" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#6d28d9" text-anchor="middle">velocity</text>
  <rect x="502" y="204" width="82" height="22" rx="6" fill="#7c3aed" opacity="0.1"/>
  <text x="543" y="219" font-family="'SF Mono',monospace" font-weight="600" font-size="10.5" fill="#6d28d9" text-anchor="middle">+ custom hacks</text>
  <text x="490" y="250" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="10" fill="#64748b" text-anchor="middle">Modifies, delays, or cancels packets</text>

  <!-- === ARROW 2→3 === -->
  <line x1="624" y1="182" x2="714" y2="182" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowHead)" opacity="0.65"/>
  <text x="669" y="172" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="600" font-size="10" fill="#64748b" text-anchor="middle">modified</text>

  <!-- === BOX 3: Server === -->
  <g filter="url(#shadow)">
    <rect x="720" y="100" width="230" height="165" rx="16" fill="url(#boxGreen)" stroke="#86efac" stroke-width="1.5"/>
  </g>
  <rect x="740" y="118" width="34" height="34" rx="9" fill="#16a34a" opacity="0.15"/>
  <text x="757" y="141" font-size="18" text-anchor="middle">🖥️</text>
  <text x="784" y="132" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="700" font-size="15" fill="#14532d">MC Server</text>
  <text x="784" y="148" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="11" fill="#64748b">(final destination)</text>
  <line x1="740" y1="166" x2="930" y2="166" stroke="#86efac" stroke-width="1" opacity="0.4"/>
  <text x="835" y="188" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12" fill="#4b5563" text-anchor="middle">Receives the modified</text>
  <text x="835" y="205" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12" fill="#4b5563" text-anchor="middle">packets as if they were</text>
  <text x="835" y="222" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="12" fill="#4b5563" text-anchor="middle">legitimate client data</text>
  <text x="835" y="250" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="10" fill="#64748b" text-anchor="middle">Processes spoofed state as real</text>

  <!-- Return arrow -->
  <path d="M785,269 L785,290 L195,290 L195,269" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowBack)" opacity="0.35"/>
  <text x="490" y="305" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="10" fill="#94a3b8" text-anchor="middle">server response (can also be intercepted via onInbound)</text>

  <!-- Footer note -->
  <text x="490" y="365" font-family="'SF Pro Display',system-ui,sans-serif" font-weight="500" font-size="10" fill="#94a3b8" text-anchor="middle" opacity="0.45">Register custom hacks with bot.packetHacks.registerHack() to extend functionality</text>
</svg>
